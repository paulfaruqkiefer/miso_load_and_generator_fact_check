<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>MISO MCC & Wind Queue</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .info-panel { 
            position: absolute; background: rgba(255,255,255,0.9); 
            margin: 20px; padding: 15px; border-radius: 8px; 
            z-index: 1; font-family: 'Helvetica Neue', Arial, sans-serif;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            width: 220px;
        }
        .legend { margin-top: 10px; font-size: 12px; }
        .gradient {
            height: 10px; width: 100%;
            background: linear-gradient(to right, #08519c, #f7f7f7, #d94701);
            margin-bottom: 5px;
        }
        .circle-legend {
            display: inline-block;
            width: 12px; height: 12px;
            background: #00ffcc;
            border-radius: 50%;
            margin-right: 5px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="info-panel">
        <b>MISO Grid Analysis</b><br>
        <span style="font-size: 0.85em; color: #444;">Congestion vs. New Wind Queue</span>
        
        <div class="legend">
            <div style="margin-bottom: 5px;">Avg MCC ($/MWh)</div>
            <div class="gradient"></div>
            <div style="display: flex; justify-content: space-between;">
                <span>-$10</span>
                <span>$0</span>
                <span>+$10</span>
            </div>
        </div>

        <div class="legend" style="margin-top: 15px;">
            <div class="circle-legend"></div>
            <span><b>Wind Project Queue</b></span><br>
            <span style="font-size: 0.8em; color: #666;">Size = Project count per county</span>
        </div>
    </div>
    <div id="map"></div>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoicGtpZWZlciIsImEiOiJjbWx6bjFuYXcwOTNzM2dxMjh6em0zbTZoIn0.j1UEScoxbAWOIUDnjvfXOA';

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11', 
            center: [-92.5, 41.5], 
            zoom: 5
        });

        map.on('load', () => {
            // --- SOURCE: MCC TILES ---
            map.addSource('mcc-tiles', {
                type: 'geojson',
                data: 'data/miso_mcc_tiles_integrated.geojson' 
            });

            // --- SOURCE: WIND QUEUE ---
            map.addSource('wind-queue', {
                type: 'geojson',
                data: 'data/wind_queue_centroids.geojson'
            });

            // --- SOURCE: EXISTING GENERATORS ---
            map.addSource('existing-gens', {
                type: 'geojson',
                data: 'data/generators.json' 
            });
            
            // --- SOURCE: TRANSMISSION LINES ---
            map.addSource('transmission', {
                type: 'geojson',
                data: 'data/miso_midwest_transmission.json'
            });

            // --- LAYER: MCC HEATMAP ---
            map.addLayer({
                'id': 'mcc-heat',
                'type': 'fill',
                'source': 'mcc-tiles',
                'paint': {
                    'fill-color': [
                        'interpolate',
                        ['linear'],
                        ['get', 'mcc_avg'],
                        -10, '#08519c', 
                        0,   '#f7f7f7', 
                        10,  '#d94701'  
                    ],
                    'fill-opacity': 0.65
                }
            });

            // --- LAYER: TRANSMISSION LINES (Add this AFTER mcc-heat) ---
            map.addLayer({
                'id': 'transmission-lines',
                'type': 'line',
                'source': 'transmission',
                'paint': {
                    'line-color': '#ffffff',
                    'line-width': 0.8,
                    'line-opacity': 0.4
                }
            });
            
            // --- LAYER: EXISTING WIND FARMS (Replacing wind-bubbles) ---
            map.addLayer({
                'id': 'wind-farms',
                'type': 'circle',
                'source': 'existing-gens',
                'filter': ['==', ['get', 'Fuel'], 'Wind'], // Filter for Wind only
                'paint': {
                    'circle-radius': 3,
                    'circle-color': '#00ffcc',
                    'circle-stroke-width': 1,
                    'circle-stroke-color': '#000',
                    'circle-opacity': 0.9
                }
            });

            // --- INTERACTION: POPUPS ---
            const popup = new mapboxgl.Popup({
                closeButton: false,
                closeOnClick: false
            });

            // Handle hover for both layers
            map.on('mousemove', (e) => {
                const features = map.queryRenderedFeatures(e.point, {
                    layers: ['wind-farms', 'mcc-heat'] // Updated layer ID
                });
            
                if (!features.length) {
                    popup.remove();
                    map.getCanvas().style.cursor = '';
                    return;
                }
            
                map.getCanvas().style.cursor = 'pointer';
                const f = features[0];
            
                let html = "";
                if (f.layer.id === 'wind-farms') {
                    // Use whatever property holds the plant name in your generators.json
                    const name = f.properties.NAME || f.properties.Plant_Name || "Wind Farm";
                    html = `<strong>${name}</strong><br>Fuel: Wind`;
                } else {
                    html = `<strong>MCC: $${f.properties.mcc_avg.toFixed(2)}</strong>`;
                }
            
                popup.setLngLat(e.lngLat).setHTML(html).addTo(map);
            });
    </script>
</body>
</html>
