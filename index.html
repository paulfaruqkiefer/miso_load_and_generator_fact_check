<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>MISO Integrated MCC Tiles</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .info-panel { 
            position: absolute; background: rgba(255,255,255,0.9); 
            margin: 20px; padding: 15px; border-radius: 8px; 
            z-index: 1; font-family: 'Helvetica Neue', Arial, sans-serif;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        .legend { margin-top: 10px; font-size: 12px; }
        .gradient {
            height: 10px; width: 100%;
            background: linear-gradient(to right, #5e2a84, #f1f1f1, #ffcc00);
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="info-panel">
        <b>MISO Congestion (MCC)</b><br>
        <span style="font-size: 0.9em; color: #666;">Integrated Gen + Load Nodes</span>
        <div class="legend">
            <div class="gradient"></div>
            <div style="display: flex; justify-content: space-between;">
                <span>-$20 (Cheap)</span>
                <span>$0</span>
                <span>+$20 (High)</span>
            </div>
        </div>
    </div>
    <div id="map"></div>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoicGtpZWZlciIsImEiOiJjbWx6bjFuYXcwOTNzM2dxMjh6em0zbTZoIn0.j1UEScoxbAWOIUDnjvfXOA';

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11',
            center: [-92.5, 41.5], 
            zoom: 5
        });

        map.on('load', () => {
            // 1. Add the Tile Source
            map.addSource('mcc-tiles', {
                type: 'geojson',
                data: '../data/miso_mcc_tiles_integrated.geojson' 
            });

            // 2. Add the Fill Layer with a Color Interpolation
            map.addLayer({
                'id': 'mcc-heat',
                'type': 'fill',
                'source': 'mcc-tiles',
                'paint': {
                    'fill-color': [
                        'interpolate',
                        ['linear'],
                        ['get', 'mcc_avg'],
                        -15, '#08519c', // Dark Blue (Congested/Oversupply)
                        -5,  '#bdd7e7', // Light Blue
                        0,   '#f7f7f7', // Neutral (Reference Hub level)
                        5,   '#fdbe85', // Light Orange
                        15,  '#d94701'  // Deep Orange (Congested/High Demand)
                    ],
                    'fill-opacity': 0.75,
                    'fill-outline-color': 'rgba(255,255,255,0.1)'
                }
            });
            // 3. Add a hover popup for precise value checking
            const popup = new mapboxgl.Popup({
                closeButton: false,
                closeOnClick: false
            });

            map.on('mousemove', 'mcc-heat', (e) => {
                map.getCanvas().style.cursor = 'pointer';
                const mcc = e.features[0].properties.mcc_avg.toFixed(2);
                
                popup.setLngLat(e.lngLat)
                    .setHTML(`<strong>MCC: $${mcc}</strong>`)
                    .addTo(map);
            });

            map.on('mouseleave', 'mcc-heat', () => {
                map.getCanvas().style.cursor = '';
                popup.remove();
            });
        });
    </script>
</body>
</html>
